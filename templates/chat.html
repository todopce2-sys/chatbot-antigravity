<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distribuciones San Luis – Asistente Virtual</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    header .brand { font-size: 1.1rem; font-weight: 600; }
    header .meta  { font-size: 0.78rem; color: #a0aec0; }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.bot {
      background: #fff;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .msg.user {
      background: #4f46e5;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .msg.error {
      background: #fff5f5;
      border: 1px solid #fc8181;
      color: #c53030;
      align-self: flex-start;
    }

    .msg.typing {
      background: #fff;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      color: #a0aec0;
      font-style: italic;
    }

    #input-area {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input-msg {
      flex: 1;
      resize: none;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }

    #input-msg:focus { border-color: #4f46e5; }

    #btn-send {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #btn-send:hover   { background: #4338ca; }
    #btn-send:disabled { background: #a5b4fc; cursor: not-allowed; }

    #btn-actualizar {
      background: none;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #718096;
      transition: all 0.2s;
    }

    #btn-actualizar:hover { border-color: #4f46e5; color: #4f46e5; }

    @media (max-width: 600px) {
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">Distribuciones San Luis</div>
  <div class="meta">{{ total_productos }} productos · Dólar ${{ cotizacion }}</div>
</header>

<div id="chat-container">
  <div class="msg bot">¡Hola! 👋 Soy el asistente virtual de Distribuciones San Luis.
Decime qué estás buscando y te ayudo con precio, recomendación o disponibilidad.</div>
</div>

<div id="input-area">
  <button id="btn-actualizar" title="Actualizar precios y catálogo">↻ Actualizar</button>
  <textarea id="input-msg" rows="1" placeholder="Escribí tu consulta..."></textarea>
  <button id="btn-send">Enviar</button>
</div>

<script>
  const chatEl   = document.getElementById("chat-container");
  const inputEl  = document.getElementById("input-msg");
  const sendBtn  = document.getElementById("btn-send");
  const actuBtn  = document.getElementById("btn-actualizar");

  let sessionId = null;

  function addMsg(texto, tipo) {
    const div = document.createElement("div");
    div.className = `msg ${tipo}`;
    div.textContent = texto;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  async function enviar() {
    const texto = inputEl.value.trim();
    if (!texto) return;

    addMsg(texto, "user");
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    const typing = addMsg("Escribiendo...", "typing");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mensaje: texto, session_id: sessionId }),
      });
      const data = await res.json();
      typing.remove();

      if (data.error) {
        addMsg("Error: " + data.error, "error");
      } else {
        sessionId = data.session_id;
        addMsg(data.respuesta, "bot");
      }
    } catch (e) {
      typing.remove();
      addMsg("Error de conexión. Intentá de nuevo.", "error");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener("click", enviar);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  actuBtn.addEventListener("click", async () => {
    actuBtn.disabled = true;
    actuBtn.textContent = "Actualizando...";
    try {
      const res = await fetch("/actualizar", { method: "POST" });
      const data = await res.json();
      addMsg(`Catálogo actualizado: ${data.productos} productos · Dólar $${Math.round(data.cotizacion)}`, "bot");
    } catch (e) {
      addMsg("No se pudo actualizar el catálogo.", "error");
    } finally {
      actuBtn.disabled = false;
      actuBtn.textContent = "↻ Actualizar";
    }
  });
</script>

</body>
</html>
