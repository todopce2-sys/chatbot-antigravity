<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSL Sistemas – Soporte Técnico</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #0f172a;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    header .brand { font-size: 1.1rem; font-weight: 600; }
    header .meta  { font-size: 0.78rem; color: #94a3b8; }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.bot {
      background: #fff;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .msg.user {
      background: #0ea5e9;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .msg.error {
      background: #fff5f5;
      border: 1px solid #fc8181;
      color: #c53030;
      align-self: flex-start;
    }

    .msg.typing {
      background: #fff;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      color: #a0aec0;
      font-style: italic;
    }

    #input-area {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input-msg {
      flex: 1;
      resize: none;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }

    #input-msg:focus { border-color: #0ea5e9; }

    #btn-send {
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #btn-send:hover    { background: #0284c7; }
    #btn-send:disabled { background: #7dd3fc; cursor: not-allowed; }

    @media (max-width: 600px) {
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">DSL Sistemas · Soporte Técnico</div>
  <div class="meta">San Luis, Argentina · soporte@dslsistemas.com.ar</div>
</header>

<div id="chat-container">
  <div class="msg bot">Hola, soy el asistente de soporte técnico de DSL Sistemas.
Contame en qué puedo ayudarte hoy: consultas sobre nuestros servicios, sistemas, planes o cualquier problema técnico.</div>
</div>

<div id="input-area">
  <textarea id="input-msg" rows="1" placeholder="Escribí tu consulta..."></textarea>
  <button id="btn-send">Enviar</button>
</div>

<script>
  const chatEl  = document.getElementById("chat-container");
  const inputEl = document.getElementById("input-msg");
  const sendBtn = document.getElementById("btn-send");

  let sessionId = null;

  function addMsg(texto, tipo) {
    const div = document.createElement("div");
    div.className = `msg ${tipo}`;
    div.textContent = texto;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  async function enviar() {
    const texto = inputEl.value.trim();
    if (!texto) return;

    addMsg(texto, "user");
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    const typing = addMsg("Escribiendo...", "typing");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mensaje: texto, session_id: sessionId }),
      });
      const data = await res.json();
      typing.remove();

      if (data.error) {
        addMsg("Error: " + data.error, "error");
      } else {
        sessionId = data.session_id;
        addMsg(data.respuesta, "bot");
      }
    } catch (e) {
      typing.remove();
      addMsg("Error de conexión. Intentá de nuevo.", "error");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener("click", enviar);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });
</script>

</body>
</html>
